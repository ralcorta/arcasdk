name: 📦 Publish to NPM

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - all
          - core
          - pdf
        default: "all"
      version:
        description: "Version to publish (optional, auto-calculated if empty)"
        required: false
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  validate:
    name: Validate before publish
    runs-on: ubuntu-latest
    env:
      NX_DAEMON: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Setup NX
        uses: nrwl/nx-set-shas@v5

      - name: Cache NX
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-node22-${{ hashFiles('**/nx.json', '**/package-lock.json') }}
          restore-keys: |
            nx-${{ runner.os }}-node22-
            nx-${{ runner.os }}-

      - name: Run lint checks
        run: npm run lint

      - name: Run test coverage
        run: npm run test:coverage

      - name: Check for security vulnerabilities
        # --audit-level=critical: fails only on critical CVEs.
        # Known high/moderate CVEs in @xmldom/xmldom (via soap -> xml-crypto)
        # and axios/follow-redirects cannot be upgraded without breaking changes
        # and are not exploitable in this context (trusted AFIP/ARCA endpoints).
        run: npm audit --production --audit-level=critical

      - name: Build packages
        run: npm run build

  publish:
    name: Publish to NPM
    needs: validate
    runs-on: ubuntu-latest
    env:
      NX_DAEMON: "false"
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          registry-url: https://registry.npmjs.org/
          node-version: "22"
          cache: "npm"
          scope: "@arcasdk"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Configure Git Identity
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Calculate versions
        run: |
          PACKAGE="${{ inputs.package }}"
          echo "📦 Calculating versions from conventional commits..."
          if [ "$PACKAGE" == "all" ]; then
            npx nx release version
          else
            npx nx release version --projects="$PACKAGE"
          fi

      - name: Build packages
        run: npm run build

      - name: Publish to NPM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: |
          PACKAGE="${{ inputs.package }}"
          echo "🚀 Publishing to NPM..."
          if [ "$PACKAGE" == "all" ]; then
            npx nx release publish
          else
            npx nx release publish --projects="$PACKAGE"
          fi

      - name: Create and push tags
        run: |
          PACKAGE="${{ inputs.package }}"
          create_and_push_tag() {
            local PROJECT=$1 PKG_DIR=$2
            local VERSION TAG
            VERSION=$(node -p "require('./${PKG_DIR}/package.json').version")
            TAG="${PROJECT}@${VERSION}"
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG already exists, skipping"
            else
              git tag "$TAG"
              git push origin "$TAG"
              echo "✅ Created and pushed tag $TAG"
            fi
          }
          if [ "$PACKAGE" == "all" ] || [ "$PACKAGE" == "core" ]; then
            create_and_push_tag "core" "packages/core"
          fi
          if [ "$PACKAGE" == "all" ] || [ "$PACKAGE" == "pdf" ]; then
            create_and_push_tag "pdf" "packages/pdf"
          fi

      - name: Create GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE="${{ inputs.package }}"
          create_release() {
            local PROJECT=$1 PKG_DIR=$2
            local VERSION TAG
            VERSION=$(node -p "require('./${PKG_DIR}/package.json').version")
            TAG="${PROJECT}@${VERSION}"
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG already exists, skipping"
            else
              gh release create "$TAG" \
                --title "@arcasdk/${PROJECT} ${VERSION}" \
                --generate-notes \
                --latest
              echo "✅ Created GitHub release $TAG"
            fi
          }
          if [ "$PACKAGE" == "all" ] || [ "$PACKAGE" == "core" ]; then
            create_release "core" "packages/core"
          fi
          if [ "$PACKAGE" == "all" ] || [ "$PACKAGE" == "pdf" ]; then
            create_release "pdf" "packages/pdf"
          fi

      - name: Publish Summary
        if: success()
        run: |
          PACKAGE="${{ inputs.package }}"
          echo "## ✅ NPM Publishing Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Validation**: Lint, tests, coverage, audit, build" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Version Bump**: Automatic via Conventional Commits" >> $GITHUB_STEP_SUMMARY
          if [ "$PACKAGE" == "all" ]; then
            echo "✅ **Published**: @arcasdk/core + @arcasdk/pdf" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📦 [core on NPM](https://www.npmjs.com/package/@arcasdk/core)" >> $GITHUB_STEP_SUMMARY
            echo "📦 [pdf on NPM](https://www.npmjs.com/package/@arcasdk/pdf)" >> $GITHUB_STEP_SUMMARY
          elif [ "$PACKAGE" == "core" ]; then
            echo "✅ **Published**: @arcasdk/core" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📦 [View on NPM](https://www.npmjs.com/package/@arcasdk/core)" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Published**: @arcasdk/pdf" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📦 [View on NPM](https://www.npmjs.com/package/@arcasdk/pdf)" >> $GITHUB_STEP_SUMMARY
          fi

