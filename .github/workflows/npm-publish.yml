name: 📦 Publish to NPM

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (optional, auto-calculated if empty)"
        required: false
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  validate:
    name: Validate before publish
    runs-on: ubuntu-latest
    env:
      NX_DAEMON: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Setup NX
        uses: nrwl/nx-set-shas@v5

      - name: Cache NX
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-node22-${{ hashFiles('**/nx.json', '**/package-lock.json') }}
          restore-keys: |
            nx-${{ runner.os }}-node22-
            nx-${{ runner.os }}-

      - name: Run lint checks
        run: npm run lint

      - name: Run test coverage
        run: npm run test:coverage

      - name: Check for security vulnerabilities
        # --audit-level=critical: fails only on critical CVEs.
        # Known high/moderate CVEs in @xmldom/xmldom (via soap -> xml-crypto)
        # and axios/follow-redirects cannot be upgraded without breaking changes
        # and are not exploitable in this context (trusted AFIP/ARCA endpoints).
        run: npm audit --production --audit-level=critical

      - name: Build packages
        run: npm run build

  publish:
    name: Publish to NPM
    needs: validate
    runs-on: ubuntu-latest
    env:
      NX_DAEMON: "false"
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          registry-url: https://registry.npmjs.org/
          node-version: "22"
          cache: "npm"
          scope: "@arcasdk"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Configure Git Identity
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Release & Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: |
          echo "🚀 Versioning, changelog & publishing to NPM..."
          npx nx release --yes

      - name: Publish Summary
        if: success()
        run: |
          echo "## ✅ NPM Publishing Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Validation**: Lint, tests, coverage, audit, build" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Version Bump**: Automatic via Conventional Commits" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Published**: Package released to NPM @arcasdk/core" >> $GITHUB_STEP_SUMMARY
          echo "✅ **GitHub Release**: Created with changelog" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 [View on NPM](https://www.npmjs.com/package/@arcasdk/core)" >> $GITHUB_STEP_SUMMARY

