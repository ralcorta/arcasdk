name: CI & Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    env:
      NX_DAEMON: "false"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Setup NX
        uses: nrwl/nx-set-shas@v4

      - name: Cache NX
        uses: actions/cache@v6
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-node22-${{ github.ref }}-${{ hashFiles('**/nx.json', '**/package-lock.json') }}
          restore-keys: |
            nx-${{ runner.os }}-node22-${{ github.ref }}-
            nx-${{ runner.os }}-node22-
            nx-${{ runner.os }}-

      - name: Build packages
        run: npm run build

      - name: Build Documentation
        run: npm run docs:build

      - name: Summary
        run: |
          echo "## ✅ Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Packages**: Built successfully" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Documentation**: Built successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🚀 To publish, run '📦 Publish to NPM' workflow manually" >> $GITHUB_STEP_SUMMARY
