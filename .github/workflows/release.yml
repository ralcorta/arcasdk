name: Release & Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    name: Calculate Version & Release
    runs-on: ubuntu-latest
    env:
      NX_DAEMON: "false"
    outputs:
      version: ${{ steps.version.outputs.version }}
      published: ${{ steps.version.outputs.published }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Setup NX
        uses: nrwl/nx-set-shas@v4

      - name: Cache NX
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-node22-${{ github.ref }}-${{ hashFiles('**/nx.json', '**/package-lock.json') }}
          restore-keys: |
            nx-${{ runner.os }}-node22-${{ github.ref }}-
            nx-${{ runner.os }}-node22-
            nx-${{ runner.os }}-

      - name: Build packages
        run: npm run build

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Calculate version with Conventional Commits
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          CURRENT_VERSION=$(node -p "require('./packages/core/package.json').version")

          if [ -z "$LAST_TAG" ]; then
            BASE_COMMIT="$(git rev-list --max-parents=0 HEAD)"
          else
            BASE_COMMIT="$LAST_TAG"
          fi

          FEAT_COUNT=$(git log "$BASE_COMMIT"..HEAD --pretty=format:"%s" 2>/dev/null | grep -c "^feat" || true)
          FIX_COUNT=$(git log  "$BASE_COMMIT"..HEAD --pretty=format:"%s" 2>/dev/null | grep -c "^fix"  || true)
          BREAKING=$(git log  "$BASE_COMMIT"..HEAD --pretty=format:"%b" 2>/dev/null | grep -c "BREAKING CHANGE" || true)

          if [ "$FEAT_COUNT" -gt 0 ] || [ "$FIX_COUNT" -gt 0 ] || [ "$BREAKING" -gt 0 ]; then
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
            if [ "$BREAKING" -gt 0 ]; then
              NEW_VERSION="$((MAJOR + 1)).0.0"
            elif [ "$FEAT_COUNT" -gt 0 ]; then
              NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
            else
              NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            fi
            echo "published=true"   >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "tag=v$NEW_VERSION"    >> $GITHUB_OUTPUT
            echo "New version: v$NEW_VERSION"
          else
            echo "published=false" >> $GITHUB_OUTPUT
            echo "No new features, fixes, or breaking changes detected"
          fi

      - name: Create and push Git tag
        if: steps.version.outputs.published == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Build Documentation
        run: npm run docs:build

      - name: Create GitHub Release
        if: steps.version.outputs.published == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Summary
        run: |
          echo "## 📦 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Documentation Built**: Documentation updated" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Code Built**: Packages built successfully" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.version.outputs.published }}" == "true" ]; then
            echo "✅ **Version Calculated**: Changes detected - ready for NPM publishing" >> $GITHUB_STEP_SUMMARY
            echo "🚀 **Next Step**: Run 'Publish to NPM' workflow manually" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **No Changes**: No changes to publish in this version" >> $GITHUB_STEP_SUMMARY
          fi

  publish-ready:
    name: Ready for NPM Publishing
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Ready
        run: |
          echo "✅ Release is ready for publishing to NPM!"
          echo ""
          echo "👉 Next: Go to 'Actions' tab → '📦 Publish to NPM' → 'Run workflow'"
          echo ""
          echo "ℹ️ This is a manual step to prevent accidental publications"
